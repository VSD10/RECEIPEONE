<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RecipeLens — AI Visual Recipe Finder</title>
{% load static %}
<link rel="shortcut icon" href="{% static 'main/icons/scan.png' %}">
<link rel="stylesheet" href="{% static 'main/style.css' %}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--p:#8b5cf6;--p2:#6d28d9;--pk:#ec4899;--or:#f97316;--bg:#030305;--s:rgba(255,255,255,.05);--b:rgba(255,255,255,.08);--b2:rgba(255,255,255,.14);--t:#f1f5f9;--m:#94a3b8;--d:#475569}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
#vanta-bg{position:fixed;inset:0;z-index:0}
#root{position:relative;z-index:1;min-height:100vh}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:rgba(3,3,5,.75);backdrop-filter:blur(20px);border-bottom:1px solid var(--b)}
.nav-logo{display:flex;align-items:center;gap:.6rem;font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,#fff 40%,var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-pill{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:linear-gradient(135deg,var(--p2),var(--pk));color:#fff;padding:3px 9px;border-radius:20px;-webkit-text-fill-color:#fff}

/* HERO */
.hero{max-width:700px;margin:0 auto;text-align:center;padding:110px 1.5rem 2rem}
.hero-tag{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--p);border:1px solid rgba(139,92,246,.3);padding:4px 14px;border-radius:20px;background:rgba(139,92,246,.07);margin-bottom:1.2rem}
.hero-tag span{width:6px;height:6px;border-radius:50%;background:var(--p);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,6vw,3.6rem);font-weight:800;line-height:1.1;letter-spacing:-.04em;margin-bottom:.8rem}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--p),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--m);font-size:1rem;line-height:1.65;max-width:480px;margin:0 auto}

/* UPLOAD AREA */
.wrap{max-width:900px;margin:0 auto;padding:0 1.5rem 5rem}
.upload-card{background:rgba(255,255,255,.03);border:1px solid var(--b);border-radius:24px;padding:2rem;margin-bottom:1.5rem;position:relative;overflow:hidden;transition:border-color .3s}
.upload-card:hover{border-color:var(--b2)}
.upload-card::before{content:'';position:absolute;top:-100px;left:-100px;width:300px;height:300px;background:radial-gradient(circle,rgba(139,92,246,.12),transparent 70%);pointer-events:none}
.upload-card::after{content:'';position:absolute;bottom:-100px;right:-100px;width:300px;height:300px;background:radial-gradient(circle,rgba(236,72,153,.08),transparent 70%);pointer-events:none}

.drop-zone{width:100%;height:260px;border:2px dashed var(--b2);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;margin-bottom:1.5rem;background:rgba(255,255,255,.02)}
.drop-zone.drag{border-color:var(--p);background:rgba(139,92,246,.06);box-shadow:0 0 40px rgba(139,92,246,.15)}
.drop-zone img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;border-radius:14px}
.drop-placeholder{display:flex;flex-direction:column;align-items:center;gap:.6rem;color:var(--d);pointer-events:none}
.drop-placeholder svg{opacity:.4}
.drop-placeholder p{font-size:.82rem}
.scan-line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--p),transparent);animation:scan 2s linear infinite;opacity:0}
.drop-zone.drag .scan-line{opacity:1}
@keyframes scan{0%{top:0}100%{top:100%}}

.btn-row{display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap}
.file-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:50px;cursor:pointer;border:1px solid var(--b2);background:rgba(255,255,255,.05);color:var(--t);font-size:.84rem;font-weight:500;font-family:'Inter',sans-serif;transition:all .3s;position:relative;overflow:hidden}
.file-btn:hover{border-color:var(--p);color:var(--p);background:rgba(139,92,246,.1);box-shadow:0 0 24px rgba(139,92,246,.18)}
.file-btn input{opacity:0;position:absolute;inset:0;cursor:pointer;font-size:0}
.gen-btn{display:inline-flex;align-items:center;gap:10px;padding:13px 32px;border-radius:50px;border:none;background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;font-size:.95rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:0 0 40px rgba(139,92,246,.4);transition:all .3s;position:relative;overflow:hidden}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 0 60px rgba(139,92,246,.6)}
.gen-btn:active{transform:translateY(0)}
.gen-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* AI THINKING */
.ai-box{display:flex;flex-direction:column;align-items:center;gap:1.2rem;padding:2rem;margin-top:.5rem}
.orbs{display:flex;gap:10px}
.orb{width:14px;height:14px;border-radius:50%;animation:pulse 1.4s ease-in-out infinite}
.orb:nth-child(1){background:var(--p);animation-delay:0s}
.orb:nth-child(2){background:var(--pk);animation-delay:.2s}
.orb:nth-child(3){background:var(--or);animation-delay:.4s}
@keyframes pulse{0%,100%{transform:scale(.8);opacity:.4}50%{transform:scale(1.4);opacity:1}}
.ai-label{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;background:linear-gradient(135deg,var(--p),var(--pk));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ai-sub{font-size:.82rem;color:var(--m)}

/* RESULTS */
.section-head{display:flex;align-items:center;gap:.75rem;margin:2.5rem 0 1.2rem}
.section-head h2{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700}
.cnt{font-size:.72rem;font-weight:700;background:rgba(139,92,246,.15);color:var(--p);border:1px solid rgba(139,92,246,.3);padding:3px 10px;border-radius:20px}

/* RECIPE CARD */
.rcard{background:rgba(255,255,255,.03);border:1px solid var(--b);border-radius:22px;margin-bottom:1.2rem;overflow:hidden;position:relative;transition:transform .3s,border-color .3s,box-shadow .3s;animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.rcard:hover{transform:translateY(-5px);border-color:rgba(139,92,246,.35);box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 40px rgba(139,92,246,.12)}
.rcard-glow-a{position:absolute;top:-60px;left:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(249,115,22,.2),transparent 70%);filter:blur(40px);pointer-events:none}
.rcard-glow-b{position:absolute;bottom:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(139,92,246,.18),transparent 70%);filter:blur(40px);pointer-events:none}

.rcard-head{padding:1.4rem 1.4rem 1rem;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;position:relative}
.rcard-name{font-family:'Space Grotesk',sans-serif;font-size:1.25rem;font-weight:700}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:20px}
.bt{background:rgba(249,115,22,.1);color:var(--or);border:1px solid rgba(249,115,22,.25)}
.bc{background:rgba(139,92,246,.1);color:var(--p);border:1px solid rgba(139,92,246,.25)}

.rcard-body{display:flex;flex-wrap:wrap;position:relative}
.col{flex:1;min-width:260px;padding:1.4rem}
.col:first-child{border-right:1px solid var(--b)}
.col-label{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--p);margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.col-label::before{content:'';width:3px;height:11px;background:linear-gradient(to bottom,var(--p),var(--pk));border-radius:2px}
.col p{font-size:.84rem;line-height:1.75;color:var(--m)}

/* SHOW MORE */
.more-btn{display:block;width:100%;margin-top:.5rem;padding:11px;border-radius:14px;border:1px dashed var(--b2);background:rgba(255,255,255,.02);color:var(--m);font-size:.82rem;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;transition:all .3s;text-align:center}
.more-btn:hover{border-color:var(--p);color:var(--p);background:rgba(139,92,246,.06)}
/* FOOTER */
footer{text-align:center;padding:1.2rem;border-top:1px solid var(--b);background:rgba(3,3,5,.6);backdrop-filter:blur(20px);font-size:.75rem;color:var(--d)}
/* RECIPE NAME GRID */
.name-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem;margin-bottom:2rem}
.name-card{background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:14px;padding:1rem 1.2rem;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.name-card:hover{border-color:rgba(139,92,246,.4);background:rgba(139,92,246,.07);transform:translateY(-2px)}
.name-card.active{border-color:var(--p);background:rgba(139,92,246,.12);box-shadow:0 0 24px rgba(139,92,246,.2)}
.name-card .nc-num{font-size:.65rem;font-weight:700;letter-spacing:.1em;color:var(--p);text-transform:uppercase;margin-bottom:.3rem}
.name-card .nc-name{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;line-height:1.3}
.name-card .nc-meta{font-size:.72rem;color:var(--m);margin-top:.4rem}
/* DETAIL PANEL */
.detail-panel{background:rgba(255,255,255,.03);border:1px solid rgba(139,92,246,.25);border-radius:22px;overflow:hidden;animation:fadeUp .4s ease both;margin-bottom:1.5rem;position:relative}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.detail-panel::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(139,92,246,.15),transparent 70%);filter:blur(30px);pointer-events:none}
.dp-head{padding:1.4rem 1.5rem;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem}
.dp-title{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:800}
.dp-badges{display:flex;gap:8px;flex-wrap:wrap}
.dbadge{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;padding:4px 11px;border-radius:20px}
.db-cal{background:rgba(139,92,246,.12);color:var(--p);border:1px solid rgba(139,92,246,.25)}
.db-time{background:rgba(249,115,22,.1);color:var(--or);border:1px solid rgba(249,115,22,.25)}
/* COLS */
.dp-cols{display:flex;flex-wrap:wrap}
.dp-col{flex:1;min-width:260px;padding:1.4rem}
.dp-col+.dp-col{border-left:1px solid var(--b)}
.col-hd{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--p);margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.col-hd::before{content:'';width:3px;height:11px;background:linear-gradient(to bottom,var(--p),var(--pk));border-radius:2px}
/* INGREDIENT LIST */
.ing-list{list-style:none;display:flex;flex-direction:column;gap:.5rem}
.ing-item{display:flex;align-items:flex-start;gap:.6rem;font-size:.84rem;color:var(--m);line-height:1.4}
.ing-check{width:18px;height:18px;border-radius:6px;border:1px solid rgba(139,92,246,.4);background:rgba(139,92,246,.08);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
/* STEPS */
.step-list{display:flex;flex-direction:column;gap:.75rem}
.step-item{display:flex;gap:.75rem;align-items:flex-start}
.step-num{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--p));color:#fff;font-size:.72rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:.84rem;color:var(--m);line-height:1.6}
/* NUTRITION PANEL */
.nutr-panel{border-top:1px solid var(--b);padding:1.4rem 1.5rem}
.nutr-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.2rem}
.nutr-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700}
.serving-row{display:flex;align-items:center;gap:.6rem;font-size:.82rem;color:var(--m)}
.serving-input{width:70px;padding:6px 10px;border-radius:8px;border:1px solid var(--b2);background:rgba(255,255,255,.06);color:var(--t);font-size:.82rem;font-family:'Inter',sans-serif;text-align:center}
.serving-input:focus{outline:none;border-color:var(--p)}
.nutr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.75rem}
.nutr-item{background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:12px;padding:.9rem 1rem}
.nutr-val{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:.2rem}
.nutr-lbl{font-size:.7rem;color:var(--m);font-weight:500}
.nutr-bar{height:4px;border-radius:4px;background:rgba(255,255,255,.08);margin-top:.5rem;overflow:hidden}
.nutr-fill{height:100%;border-radius:4px;transition:width .6s ease}
@media(max-width:620px){.dp-col+.dp-col{border-left:none;border-top:1px solid var(--b)}.hero h1{font-size:2rem}.btn-row{flex-direction:column}.nutr-grid{grid-template-columns:repeat(2,1fr)}}

</style>
</head>

<div id="vanta-bg"></div>

<!-- Django data bridge -->
<script>
window.__DATA__ = {
  uploadedImage: "{{ uploaded_image|default:'' }}",
  recipes: [
    {% for x in recipe_list_to_return %}
    { name:"{{ x.0|escapejs }}", cal:"{{ x.1|escapejs }}", time:"{{ x.2|escapejs }}", ing:"{{ x.3|escapejs }}", dir:"{{ x.4|escapejs }}" }{% if not forloop.last %},{% endif %}
    {% endfor %}
  ],
  similar: [
    {% for x in similar_recipe_list %}
    { name:"{{ x.0|escapejs }}", cal:"{{ x.1|escapejs }}", time:"{{ x.2|escapejs }}", ing:"{{ x.3|escapejs }}", dir:"{{ x.4|escapejs }}" }{% if not forloop.last %},{% endif %}
    {% endfor %}
  ],
  csrfToken: "{{ csrf_token }}"
};
</script>


<div id="root"></div>

{% verbatim %}<script type="text/babel">
const {useState,useRef,useCallback}=React;

/* ── helpers ── */
function parseIng(str){
  if(!str)return[];
  // split on comma, semicolon, or numbered patterns
  let parts=str.split(/,(?![^()]*\))|;|\d+\.\s/).map(s=>s.trim()).filter(Boolean);
  if(parts.length<=1) parts=str.split(/\s{2,}/).map(s=>s.trim()).filter(Boolean);
  return parts;
}
function parseSteps(str){
  if(!str)return[];
  let parts=str.split(/(?<=[.!?])\s+(?=[A-Z0-9])/).map(s=>s.trim()).filter(s=>s.length>4);
  if(parts.length<=1) parts=str.split(/\.\s+/).map(s=>s.trim()).filter(Boolean);
  return parts;
}
function calcNutr(cal,serving){
  const c=parseFloat(cal)||300;
  const s=parseFloat(serving)||1;
  const base={cal:c,protein:Math.round(c*0.25/4),carbs:Math.round(c*0.45/4),fat:Math.round(c*0.30/9),fiber:5,sodium:820};
  return Object.fromEntries(Object.entries(base).map(([k,v])=>[k,Math.round(v*s)]));
}

/* ── icons ── */
const Star=()=><svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M10,21.236,6.755,14.745.264,11.5,6.755,8.255,10,1.764l3.245,6.491L19.736,11.5l-6.491,3.245ZM18,21l1.5,3L21,21l3-1.5L21,18l-1.5-3L18,18l-3,1.5ZM19.333,4.667,20.5,7l1.167-2.333L24,3.5,21.667,2.333,20.5,0,19.333,2.333,17,3.5Z"/></svg>;
const Upload=()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
const Cam=()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>;
const Photo=()=><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>;

/* ── Nutrition Panel ── */
function NutrPanel({cal}){
  const [serving,setServing]=useState(1);
  const n=calcNutr(cal,serving);
  const items=[
    {lbl:'Calories',val:n.cal,unit:'kcal',color:'#8b5cf6',pct:Math.min(100,n.cal/25)},
    {lbl:'Protein',val:n.protein,unit:'g',color:'#10b981',pct:Math.min(100,n.protein/0.56)},
    {lbl:'Carbs',val:n.carbs,unit:'g',color:'#f59e0b',pct:Math.min(100,n.carbs/3)},
    {lbl:'Fat',val:n.fat,unit:'g',color:'#ec4899',pct:Math.min(100,n.fat/0.78)},
    {lbl:'Fiber',val:n.fiber,unit:'g',color:'#06b6d4',pct:Math.min(100,n.fiber/0.38)},
    {lbl:'Sodium',val:n.sodium,unit:'mg',color:'#f97316',pct:Math.min(100,n.sodium/23)},
  ];
  return(
    <div className="nutr-panel">
      <div className="nutr-head">
        <span className="nutr-title">📊 Nutritional Analysis</span>
        <div className="serving-row">
          <span>Serving size:</span>
          <input className="serving-input" type="number" min="0.5" max="10" step="0.5"
            value={serving} onChange={e=>setServing(e.target.value)}/>
          <span>portion{serving!=1?'s':''}</span>
        </div>
      </div>
      <div className="nutr-grid">
        {items.map(it=>(
          <div className="nutr-item" key={it.lbl}>
            <div className="nutr-val" style={{color:it.color}}>{it.val}<span style={{fontSize:'.75rem',fontWeight:500,opacity:.7,marginLeft:2}}>{it.unit}</span></div>
            <div className="nutr-lbl">{it.lbl}</div>
            <div className="nutr-bar"><div className="nutr-fill" style={{width:`${it.pct}%`,background:it.color}}/></div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Recipe Detail ── */
function RecipeDetail({r,onClose}){
  const ings=parseIng(r.ing);
  const steps=parseSteps(r.dir);
  const [checked,setChecked]=useState({});
  const toggle=i=>setChecked(p=>({...p,[i]:!p[i]}));
  return(
    <div className="detail-panel">
      {/* header */}
      <div className="dp-head">
        <div>
          <div style={{fontSize:'.68rem',fontWeight:700,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--p)',marginBottom:'.3rem'}}>Recipe Details</div>
          <div className="dp-title">{r.name}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'.75rem',flexWrap:'wrap'}}>
          <div className="dp-badges">
            {r.cal&&<span className="dbadge db-cal">⚡ {r.cal} kcal</span>}
            {r.time&&<span className="dbadge db-time">⏱ {r.time}</span>}
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.06)',border:'1px solid var(--b2)',borderRadius:'50%',width:32,height:32,cursor:'pointer',color:'var(--m)',fontSize:'1rem',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
        </div>
      </div>

      {/* cols */}
      <div className="dp-cols">
        {/* ingredients */}
        <div className="dp-col">
          <div className="col-hd">🛒 Ingredients <span style={{color:'var(--m)',fontWeight:400,textTransform:'none',letterSpacing:0}}>({ings.length})</span></div>
          <ul className="ing-list">
            {ings.map((ing,i)=>(
              <li className="ing-item" key={i} style={{opacity:checked[i]?.8:1,textDecoration:checked[i]?'line-through':'none',cursor:'pointer'}} onClick={()=>toggle(i)}>
                <div className="ing-check" style={checked[i]?{background:'var(--p)',borderColor:'var(--p)'}:{}}>
                  {checked[i]&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
                </div>
                <span>{ing}</span>
              </li>
            ))}
          </ul>
        </div>

        {/* directions */}
        <div className="dp-col">
          <div className="col-hd">👨‍🍳 Directions <span style={{color:'var(--m)',fontWeight:400,textTransform:'none',letterSpacing:0}}>({steps.length} steps)</span></div>
          <div className="step-list">
            {steps.map((step,i)=>(
              <div className="step-item" key={i}>
                <div className="step-num">{i+1}</div>
                <div className="step-text">{step.replace(/^[.\s]+/,'')}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* nutrition */}
      <NutrPanel cal={r.cal}/>

      {/* Action Buttons */}
      <div style={{padding:'0 1.5rem 1.4rem',display:'flex',gap:'.75rem',flexWrap:'wrap'}}>
        <a href={`https://www.swiggy.com/search?query=${encodeURIComponent(r.name)}`} target="_blank" rel="noreferrer" style={{flex:1,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:'8px',padding:'12px',borderRadius:'12px',background:'linear-gradient(135deg, #fc8019, #e23744)',color:'white',textDecoration:'none',fontWeight:700,fontSize:'.85rem',boxShadow:'0 4px 15px rgba(252,128,25,.2)',transition:'transform .2s'}}>
          🛵 Order on Swiggy / Zomato
        </a>
        <a href={`https://blinkit.com/s/?q=${encodeURIComponent(ings.join(' '))}`} target="_blank" rel="noreferrer" style={{flex:1,display:'inline-flex',alignItems:'center',justifyContent:'center',gap:'8px',padding:'12px',borderRadius:'12px',background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.1)',color:'white',textDecoration:'none',fontWeight:700,fontSize:'.85rem',transition:'all .2s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,.1)'} onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,.05)'}>
          🛍️ Buy Ingredients (Blinkit)
        </a>
      </div>
    </div>
  );
}

/* ── Main App ── */
function App(){
  const data=window.__DATA__;
  const allRecipes=[...data.recipes,...data.similar];
  const [imgSrc,setImgSrc]=useState(data.uploadedImage?`data:image/png;base64,${data.uploadedImage}`:null);
  const [drag,setDrag]=useState(false);
  const [loading,setLoading]=useState(false);
  const [selected,setSelected]=useState(data.recipes.length>0?0:null);
  const fileRef=useRef(null);
  const capRef=useRef(null);

  const handleFile=useCallback(file=>{
    if(!file||!file.type.startsWith('image/'))return;
    setImgSrc(URL.createObjectURL(file));
    const dt=new DataTransfer();dt.items.add(file);
    if(fileRef.current)fileRef.current.files=dt.files;
  },[]);

  const onDrop=useCallback(e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0]);},[handleFile]);

  const hasResults=allRecipes.length>0;

  return(
    <>
      {/* NAV */}
      <nav className="nav">
        <div style={{display:'flex',alignItems:'center',gap:'1rem'}}>
          <a href="/" style={{display:'inline-flex',alignItems:'center',gap:'5px',fontSize:'.78rem',color:'var(--m)',textDecoration:'none',padding:'5px 11px',border:'1px solid var(--b)',borderRadius:'50px',transition:'all .3s'}}
            onMouseOver={e=>{e.target.style.color='#8b5cf6';e.target.style.borderColor='rgba(139,92,246,.5)'}} onMouseOut={e=>{e.target.style.color='var(--m)';e.target.style.borderColor='var(--b)'}}>
            ← Home
          </a>
          <div className="nav-logo">
            <svg width="20" height="20" viewBox="0 0 24 24"><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#8b5cf6"/><stop offset="100%" stopColor="#ec4899"/></linearGradient></defs><path d="M10,21.236,6.755,14.745,0.264,11.5,6.755,8.255,10,1.764l3.245,6.491L19.736,11.5l-6.491,3.245ZM18,21l1.5,3L21,21l3-1.5L21,18l-1.5-3L18,18l-3,1.5ZM19.333,4.667,20.5,7l1.167-2.333L24,3.5,21.667,2.333,20.5,0,19.333,2.333,17,3.5Z" fill="url(#lg)"/></svg>
            RecipeLens
          </div>
          <span className="nav-pill">AI Beta</span>
        </div>
      </nav>

      {/* HERO */}
      <section className="hero">
        <div className="hero-tag"><span></span>DenseNet201 Vision AI</div>
        <h1>Snap a dish.<br/><em>Get the recipe.</em></h1>
        <p>Upload any Indian food photo — AI identifies it and returns structured recipes with full nutrition analysis.</p>
      </section>

      <div className="wrap">
        {/* UPLOAD */}
        <div className="upload-card">
          <div className={`drop-zone${drag?' drag':''}`}
            onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={onDrop}
            onClick={()=>!imgSrc&&fileRef.current?.click()}>
            <div className="scan-line"/>
            {imgSrc?<img src={imgSrc} alt="preview"/>:<div className="drop-placeholder"><Photo/><p>Drag &amp; drop your food photo here</p><p style={{fontSize:'.74rem',opacity:.6}}>PNG · JPG · WEBP</p></div>}
          </div>
          <form method="post" encType="multipart/form-data" onSubmit={()=>setLoading(true)}>
            <input type="hidden" name="csrfmiddlewaretoken" value={data.csrfToken}/>
            <div className="btn-row">
              <label className="file-btn"><Upload/>Upload Image<input ref={fileRef} type="file" name="image" accept="image/*" onChange={e=>handleFile(e.target.files[0])}/></label>
              <label className="file-btn"><Cam/>Take Photo<input ref={capRef} type="file" name="image" accept="image/*" capture="environment" onChange={e=>handleFile(e.target.files[0])}/></label>
              <button type="submit" className="gen-btn" disabled={loading||!imgSrc}><Star/>{loading?'Analyzing…':'Generate Recipe'}</button>
            </div>
          </form>
          {loading&&(
            <div className="ai-box">
              <div className="orbs"><div className="orb"/><div className="orb"/><div className="orb"/></div>
              <div className="ai-label">Vision AI is scanning your dish…</div>
              <div className="ai-sub">Matching against Indian dish database · Calculating nutrition</div>
            </div>
          )}
        </div>

        {/* RESULTS */}
        {hasResults&&(
          <>
            <div className="section-head">
              <h2>🍽️ AI Matches</h2>
              <span className="cnt">{allRecipes.length} dishes found</span>
            </div>
            <p style={{fontSize:'.82rem',color:'var(--m)',marginBottom:'1.2rem'}}>Select a dish below to see the full recipe, ingredients &amp; nutrition</p>

            {/* NAME GRID */}
            <div className="name-grid">
              {allRecipes.map((r,i)=>(
                <div key={i} className={`name-card${selected===i?' active':''}`} onClick={()=>setSelected(selected===i?null:i)}>
                  <div className="nc-num">Match #{i+1} {i<data.recipes.length?'★':''}</div>
                  <div className="nc-name">{r.name}</div>
                  <div className="nc-meta">{r.cal&&`⚡ ${r.cal} kcal`}{r.time&&` · ⏱️ ${r.time}`}</div>
                </div>
              ))}
            </div>

            {/* DETAIL */}
            {selected!==null&&allRecipes[selected]&&(
              <RecipeDetail r={allRecipes[selected]} onClose={()=>setSelected(null)}/>
            )}
          </>
        )}
      </div>

      <footer>Built with ❤️ by Diwakar · Naveen · Pradeep · Madhan &nbsp;|&nbsp; RecipeLens © 2024</footer>
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
